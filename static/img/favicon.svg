<svg width="32" height="32" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1121d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rabbit/MQ icon -->
  <g transform="translate(50, 50)">
    <!-- Rabbit ears -->
    <ellipse cx="30" cy="25" rx="8" ry="20" fill="url(#faviconGradient32)" transform="rotate(-15 30 25)"/>
    <ellipse cx="70" cy="25" rx="8" ry="20" fill="url(#faviconGradient32)" transform="rotate(15 70 25)"/>

    <!-- Rabbit head -->
    <circle cx="50" cy="50" r="25" fill="url(#faviconGradient32)"/>

    <!-- Inner circle (message queue) -->
    <circle cx="50" cy="50" r="18" fill="#ffffff"/>

    <!-- MQ dots -->
    <circle cx="43" cy="50" r="3" fill="url(#faviconGradient32)"/>
    <circle cx="50" cy="50" r="3" fill="url(#faviconGradient32)"/>
    <circle cx="57" cy="50" r="3" fill="url(#faviconGradient32)"/>

    <!-- Arrow/message indicator -->
    <path d="M 50 38 L 50 30" stroke="url(#faviconGradient32)" stroke-width="2" stroke-linecap="round"/>
    <polygon points="50,26 46,32 54,32" fill="url(#faviconGradient32)"/>
  </g>
</svg>
