<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1121d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.1"/>

  <!-- Rabbit/MQ icon -->
  <g transform="translate(50, 50)">
    <!-- Rabbit ears -->
    <ellipse cx="30" cy="25" rx="8" ry="20" fill="url(#logoGradient)" transform="rotate(-15 30 25)"/>
    <ellipse cx="70" cy="25" rx="8" ry="20" fill="url(#logoGradient)" transform="rotate(15 70 25)"/>

    <!-- Rabbit head -->
    <circle cx="50" cy="50" r="25" fill="url(#logoGradient)"/>

    <!-- Inner circle (message queue) -->
    <circle cx="50" cy="50" r="18" fill="#ffffff"/>

    <!-- MQ dots -->
    <circle cx="43" cy="50" r="3" fill="url(#logoGradient)"/>
    <circle cx="50" cy="50" r="3" fill="url(#logoGradient)"/>
    <circle cx="57" cy="50" r="3" fill="url(#logoGradient)"/>

    <!-- Arrow/message indicator -->
    <path d="M 50 38 L 50 30" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
    <polygon points="50,26 46,32 54,32" fill="url(#logoGradient)"/>

    <!-- Rust & Go badges -->
    <circle cx="30" cy="75" r="8" fill="url(#logoGradientLight)" opacity="0.8"/>
    <text x="30" y="79" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">R</text>

    <circle cx="70" cy="75" r="8" fill="url(#logoGradientLight)" opacity="0.8"/>
    <text x="70" y="79" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">G</text>
  </g>

  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="url(#logoGradient)" text-anchor="middle">Easy RMQ</text>
  <text x="100" y="182" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle" letter-spacing="2">MESSAGING MADE SIMPLE</text>
</svg>
